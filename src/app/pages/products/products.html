<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg border border-gray-200">
    <h1 class="text-3xl font-bold text-blue-600 text-center mb-6">
        Đây là trang sản phẩm
    </h1>

    <ul class="space-y-3">
        <li *ngFor="let product of products"
            class="px-4 py-3 bg-gray-100 rounded-lg shadow-sm hover:bg-blue-50 hover:text-blue-600 hover:shadow-md transition-all duration-200 cursor-pointer">
            {{ product }}
        </li>
    </ul>
</div>
