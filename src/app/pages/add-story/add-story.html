<h2>Thêm truyện tranh</h2>

<form [formGroup]="addForm" (ngSubmit)="submitForm()">
    <div>
        <label>Tên truyện</label>
        <input type="text" formControlName="title" />
        @if (title?.invalid && title?.touched) {

        <p style="color:red">Tên truyện phải ít nhất 3 ký tự</p>

        }
    </div>

    <div>
        <label>Tác giả</label>
        <input type="text" formControlName="author" />
    </div>

    <div>
        <label>Lượt xem</label>
        <input type="number" formControlName="views" />
        @if (views?.invalid && views?.touched) {

        <p style="color:red">Lượt xem phải >= 0</p>

        }
    </div>

    <button type="submit" [disabled]="addForm.invalid">
        Thêm truyện
    </button>
</form>
